<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <meta name="description" content="AI 기반 K-POP 댄스 코칭 · 실시간 자세 분석 플랫폼" />

    <!-- PWA / Theme - 라이트/다크 모두 대응 -->
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" href="/icons/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/icons/source.svg" sizes="any" type="image/svg+xml" />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="K-Onnode" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="K-Onnode" />
    <meta property="og:description" content="AI 기반 K-POP 댄스 코칭 · 실시간 자세 분석 플랫폼" />
    <meta property="og:image" content="/icons/pwa-512x512.png" />

    <title>K-Onnode — AI K-POP 댄스 코칭</title>

    <!-- Kakao JavaScript SDK (소셜 로그인) -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>

    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      html, body {
        background: #0a0a0a;
        margin: 0;
      }
      #onnode-boot-shell {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        box-sizing: border-box;
        color: rgba(255, 255, 255, 0.55);
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center;
      }
      #onnode-boot-shell strong {
        color: #fff;
        font-size: 15px;
      }
      #onnode-boot-shell button {
        margin-top: 8px;
        border: none;
        border-radius: 999px;
        background: #ff1f8e;
        color: #fff;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="onnode-boot-shell">
        <div
          style="
            width: 40px;
            height: 40px;
            border: 3px solid #ff1f8e;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
          "
        ></div>
        <strong>K-Onnode</strong>
        <span id="onnode-boot-message">앱을 불러오는 중...</span>
      </div>
    </div>
    <script id="onnode-boot">
      (function () {
        var mounted = false;
        var messageEl = document.getElementById('onnode-boot-message');

        function setMessage(text) {
          if (messageEl) messageEl.textContent = text;
        }

        function showRecovery(reason) {
          var root = document.getElementById('root');
          if (!root || mounted) return;
          root.innerHTML =
            '<div id="onnode-boot-shell">' +
            '<strong>앱을 불러오지 못했습니다</strong>' +
            '<span id="onnode-boot-message">' +
            reason +
            '</span>' +
            '<button type="button" id="onnode-recover-btn">캐시 삭제 후 다시 시도</button>' +
            '</div>';
          var btn = document.getElementById('onnode-recover-btn');
          if (!btn) return;
          btn.addEventListener('click', function () {
            btn.disabled = true;
            btn.textContent = '복구 중...';
            Promise.resolve()
              .then(function () {
                if ('serviceWorker' in navigator) {
                  return navigator.serviceWorker.getRegistrations().then(function (regs) {
                    return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
                  });
                }
                return undefined;
              })
              .then(function () {
                if ('caches' in window) {
                  return caches.keys().then(function (keys) {
                    return Promise.all(keys.map(function (key) { return caches.delete(key); }));
                  });
                }
                return undefined;
              })
              .finally(function () {
                try {
                  localStorage.removeItem('onnode.auth.kakaoRedirectUri');
                  localStorage.removeItem('onnode.auth.pendingProvider');
                } catch (e) {}
                window.location.href = '/?recovered=' + Date.now();
              });
          });
        }

        window.addEventListener(
          'error',
          function (event) {
            var target = event && event.target;
            if (target && target.tagName === 'SCRIPT') {
              showRecovery('앱 파일을 불러오지 못했습니다. 아래 버튼으로 캐시를 삭제해 주세요.');
            }
          },
          true,
        );

        window.setTimeout(function () {
          if (window.__ONNODE_MOUNTED__) return;
          showRecovery('앱 초기화가 멈춘 것 같습니다. 캐시 문제일 수 있습니다.');
        }, 12000);

        Object.defineProperty(window, '__ONNODE_MOUNTED__', {
          configurable: true,
          set: function (value) {
            mounted = !!value;
          },
          get: function () {
            return mounted;
          },
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
