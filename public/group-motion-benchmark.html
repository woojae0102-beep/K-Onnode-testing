<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Group Motion Browser Benchmark (PHASE 17)</title>
  <style>
    body { font-family: ui-monospace, monospace; background: #0a0a12; color: #a8f0c8; padding: 16px; }
    pre { white-space: pre-wrap; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px; }
    h1 { color: #7ec8ff; font-size: 18px; }
  </style>
</head>
<body>
  <h1>Group Motion Browser Benchmark</h1>
  <p>Synthetic runtime — NOT real K-POP production assets.</p>
  <pre id="status">Running stress + rAF benchmark...</pre>
  <script type="module">
    import { runGroupMotionStressBenchmark, runBrowserRafBenchmark } from '/src/modes/group/benchmark/groupMotionBrowserBenchmarkHarness.ts';
    import { runGroupMotionMemoryLeakBenchmark } from '/src/modes/group/benchmark/groupMotionMemoryLeakBenchmark.ts';
    import { buildFullBenchmarkReportText } from '/src/modes/group/benchmark/groupMotionBrowserBenchmarkReport.ts';

    try {
      const stress = runGroupMotionStressBenchmark();
      const rafSample = await runBrowserRafBenchmark({ avatarCount: 8, frameTarget: 120 });
      stress.samples.push({ ...rafSample, avatarCount: 8 });
      const memoryLeak = runGroupMotionMemoryLeakBenchmark(100);
      const text = buildFullBenchmarkReportText(stress, memoryLeak);
      document.getElementById('status').textContent = text;
      window.__GROUP_MOTION_BENCHMARK_REPORT__ = { stress, rafSample, memoryLeak, text };
      window.__GROUP_MOTION_BENCHMARK_DONE__ = true;
    } catch (err) {
      document.getElementById('status').textContent = String(err?.stack || err);
      window.__GROUP_MOTION_BENCHMARK_ERROR__ = err;
      window.__GROUP_MOTION_BENCHMARK_DONE__ = true;
    }
  </script>
</body>
</html>
